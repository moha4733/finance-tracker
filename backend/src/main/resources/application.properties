# Docker Compose (spring-boot-docker-compose) — slå til og kør `docker compose up` hvis du bruger compose.yaml
spring.docker.compose.enabled=false

# Database - PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/financetracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:minHemmeligeNogleErMindst32TegnLang1234}